<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Evento</title>
    <link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #205E97; /* Azul claro */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff; /* Texto en blanco para contraste */
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            width: 70%;
            max-width: 400px; /* Ajusta este valor según sea necesario */
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #2c3e50; /* Azul oscuro */
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #1a252f; /* Cambia el tono al hacer hover */
        }
    </style>

    <script>
        $(function() {
            $("#fecha").datepicker({
                dateFormat: 'dd-mm-yy'
            });
        });
    </script>
</head>
<body>
<h2>Formulario de Evento</h2>
<form th:action="@{/eventos/guardar}" method="post" th:object="${evento}">
    <input type="hidden" th:field="*{id}" />
    <label for="titulo">Título:</label>
    <input type="text" id="titulo" name="titulo" th:field="*{titulo}" required><br>

    <label for="fecha">Fecha:</label>
    <input type="text" id="fecha" name="fecha" th:field="*{fecha}" required><br>

    <label for="hora">Hora (HH:mm:ss):</label>
    <input type="text" id="hora" name="hora" th:field="*{hora}" required pattern="(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)"><br>

    <label for="descripcion">Descripción:</label>
    <textarea id="descripcion" name="descripcion" th:field="*{descripcion}"></textarea><br>

    <input type="submit" value="Guardar">
    <a th:href="@{/eventos}"><button type="button">Cancelar</button></a>
</form>
</form>
</body>
</html>
