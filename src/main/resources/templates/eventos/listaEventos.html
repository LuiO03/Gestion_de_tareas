<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Eventos</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #205E97; /* Azul claro */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff; /* Texto en blanco para contraste */
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px 0;
            color: #fff;
        }

        th, td {
            border: 1px solid #fff;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #3498db; /* Azul claro */
        }

        tr:nth-child(even) {
            background-color: #2c3e50; /* Azul oscuro */
        }

        tr:nth-child(odd) {
            background-color: #34495e; /* Azul más oscuro */
        }

        a {
            text-decoration: none;
            color: #fff;
            padding: 10px;
            margin: 10px;
            border: 1px solid #fff;
            border-radius: 8px;
        }

        a:hover {
            background-color: #1a252f; /* Cambia el tono al hacer hover */
        }
    </style>
</head>
<body>
<h2>Lista de Eventos</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Descripción</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="evento : ${eventos}">
        <td th:text="${evento.id}"></td>
        <td th:text="${evento.titulo}"></td>
        <td th:text="${#dates.format(evento.fecha, 'dd-MM-yyyy')}"></td>
        <td th:text="${#dates.format(evento.hora, 'HH:mm:ss')}"></td>
        <td th:text="${evento.descripcion}"></td>
        <td>
            <a th:href="@{/eventos/{id}/editar(id=${evento.id})}">Editar</a>
            <a th:href="@{/eventos/{id}/eliminar(id=${evento.id})}">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
<a th:href="@{/eventos/nuevo}">Nuevo Evento</a>
<a th:href="@{/dashboard}">Volver al Dashboard</a>
<a th:href="@{/login}">Salir</a>
</body>
</html>
