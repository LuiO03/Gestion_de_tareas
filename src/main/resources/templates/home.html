<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #205E97; /* Azul claro */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff; /* Texto en blanco para contraste */
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        div {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        a {
            text-decoration: none;
        }

        button {
            background-color: #2c3e50; /* Azul oscuro */
            color: #fff;
            padding: 15px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #1a252f; /* Cambia el tono al hacer hover */
        }
    </style>
</head>
<body>
<h2>Bienvenido al Dashboard</h2>

<div>
    <a th:href="@{/eventos}">
        <button>Eventos</button>
    </a>

    <a th:href="@{/contactos}">
        <button>Contactos</button>
    </a>
</div>
</body>
</html>
