<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contacto</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #205E97; /* Azul claro */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff; /* Texto en blanco para contraste */
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            width: 70%;
            max-width: 400px; /* Ajusta este valor según sea necesario */
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #2c3e50; /* Azul oscuro */
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #1a252f; /* Cambia el tono al hacer hover */
        }
    </style>
</head>
<body>
<h2>Formulario de Contacto</h2>
<form th:action="@{/contactos/guardar}" method="post" th:object="${contacto}">
    <!-- Campos del formulario -->
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" th:field="*{nombre}" required><br>

    <label for="email">Email:</label>
    <input type="text" id="email" name="email" th:field="*{email}" required><br>

    <label for="telefono">Teléfono:</label>
    <input type="text" id="telefono" name="telefono" th:field="*{telefono}"><br>

    <input type="submit" value="Guardar">
    <a th:href="@{/contactos}"><button type="button">Cancelar</button></a>
</form>
</body>
</html>
