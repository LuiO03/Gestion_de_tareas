<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda Virtual - Iniciar Sesión</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #205E97; /* Gris claro */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .agenda-container {
            background-color: #3498db; /* Azul claro */
            color: #fff; /* Texto en blanco para contraste */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .error-message {
            color: red;
            margin-top: 8px;
        }

        input[type="submit"] {
            background-color: #2c3e50; /* Azul oscuro */
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #1a252f; /* Cambia el tono al hacer hover */
        }
    </style>
</head>
<body>
<div class="agenda-container">
    <h2 >Iniciar Sesión - Agenda Virtual</h2>
    <form th:action="@{/login}" method="post">
        <label for="username">Nombre de Usuario:</label>
        <input type="text" id="username" name="username" required><br>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required><br>

        <span th:text="${error}" style="color: red"></span><br>

        <input type="submit" value="Iniciar Sesión">
    </form>
</div>
</body>
</html>
