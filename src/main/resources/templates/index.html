<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Biblioteca Virtual - Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/modules/index.css}">
</head>
<body>
<main>
    <section class="login">
        <article class="login-card">
            <div class="login-header">
                <!--<div class="logo">📒</div>-->
                <h1>Biblioteca Virtual</h1>
                <p>Inicia sesión para administrar tus contactos.</p>
            </div>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Ingresa tu usuario"
                            required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Ingresa tu contraseña"
                            required>
                </div>
                <div
                        class="error-message"
                        th:if="${error}"
                        th:text="${error}">
                </div>
                <button type="submit">
                    Iniciar sesión
                </button>
            </form>
        </article>

    </section>
</main>
</body>
</html>
